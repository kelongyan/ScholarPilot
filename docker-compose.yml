# Docker Compose for ScholarPilot local infrastructure.
#
# Starts PostgreSQL, Qdrant, and Redis. The backend and frontend run locally
# (uv run uvicorn ... / pnpm dev) so they can hot-reload during development.
#
# Usage:
#   docker compose up -d        # start infra
#   docker compose ps            # check status
#   docker compose down          # stop (keeps data)
#   docker compose down -v       # stop and delete data volumes
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: scholarpilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scholarpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scholarpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: scholarpilot-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scholarpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
